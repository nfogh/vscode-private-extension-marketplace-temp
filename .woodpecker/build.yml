clone:
   - name: git
     image: woodpeckerci/plugin-git
     settings:
        path: /woodpecker/git

matrix:
  EXTENSION:
    - extension
    - remote-helper

steps:
  build:
    when:
      event: [push, pull_request]
    image: nfogh/vscode-ci-test
    commands:
      - cd /woodpecker/git/${EXTENSION}
      - npm ci
      - npm run lint
      - xvfb-run --auto-servernum --server-args='-screen 0 1920x1080x24' npm run test
      - npx vsce package --out extension.vsix --baseImagesUrl=https://codeberg.org/nfogh/vscode-private-extension-marketplace/raw/commit/$(git rev-parse HEAD)/main/${EXTENSION}
