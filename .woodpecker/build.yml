clone:
   - name: git
     image: woodpeckerci/plugin-git
     settings:
        path: /woodpecker/git

matrix:
  EXTENSION:
    - extension
    - remote-helper
steps:
  build:
    when:
      event: [push, pull_request]
    image: node
    commands:
      - cd /woodpecker/git/${EXTENSION}
      - npm ci
      - npm run lint
      - apt update
      - DEBIAN_FRONTEND=noninteractive apt-get --yes install libnss3 libatk1.0-0 libdbus-1-3 libatk-bridge2.0-0 libgtk-3-0 libgbm1 libasound2 xvfb
      - xvfb-run npm run test
      - npx vsce package
  